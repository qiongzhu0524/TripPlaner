services:
  app:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE__DSN=postgresql+asyncpg://tripuser:tripsecret@db:5432/tripplaner
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tripuser
      POSTGRES_PASSWORD: tripsecret
      POSTGRES_DB: tripplaner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripuser -d tripplaner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
